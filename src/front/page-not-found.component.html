
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="text-center">
    <!-- Ícone de alerta estilizado -->
    <div class="display-1 text-warning mb-4">
      <i class="bi bi-exclamation-octagon"></i>
    </div>

    <h1 class="display-4 fw-bold text-dark">404</h1>
    <h2 class="mb-4">Ops! Página não encontrada</h2>

    <p class="text-muted mb-5 fs-5">
      A página que você está procurando não existe ou foi movida.<br>
      Verifique o endereço digitado ou retorne ao início.
    </p>

    <div class="d-flex justify-content-center gap-3">
      <button (click)="goBack()" class="btn btn-outline-secondary px-4 py-2">
        <i class="bi bi-arrow-left me-2"></i>Voltar
      </button>

      <a routerLink="/" class="btn btn-success px-4 py-2">
        <i class="bi bi-house-door me-2"></i>Página Inicial
      </a>
    </div>

    <!-- Pequena referência ao sistema no rodapé da página -->
    <div class="mt-5 pt-5 border-top">
      <small class="text-secondary">Company001 System Architect</small>
    </div>
  </div>
</div>
