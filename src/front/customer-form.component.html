<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-light">
      <h2 class="mb-0">{{ isEditMode ? 'Editar Cliente' : 'Cadastrar Novo Cliente' }}</h2>
    </div>

    <div class="card-body">
      @if (!loading) {
        <form [formGroup]="customerForm" (ngSubmit)="saveCustomer()">
          @if (isEditMode) {
            <div class="mb-3">
              <label for="id" class="form-label">ID do cliente</label>
              <div class="input-group">
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  title="Copiar ID"
                  (click)="copyToClipboard()">
                  <i class="bi bi-clipboard"></i>
                </button>
                <input
                  type="text"
                  class="form-control bg-light"
                  id="id"
                  formControlName="idCustomer"
                  readonly>
              </div>
            </div>
          }

          <div class="mb-3">
            <label for="businessName" class="form-label">Nome do cliente</label>
            <input
              #nameInput
              type="text"
              class="form-control"
              id="businessName"
              formControlName="businessName"
              [class.is-invalid]="customerForm.get('businessName')?.invalid && customerForm.get('businessName')?.touched">
            <div class="invalid-feedback">O nome é obrigatório (mínimo 3 caracteres).</div>
          </div>

          <div class="mb-3">
            <label for="corporateName" class="form-label">Razão social</label>
            <input
              type="text"
              class="form-control"
              id="corporateName"
              formControlName="corporateName"
              [class.is-invalid]="customerForm.get('corporateName')?.invalid && customerForm.get('corporateName')?.touched">
            <div class="invalid-feedback">A razão social é obrigatória (mínimo 3 caracteres).</div>
          </div>

          <div class="mb-3">
            <label for="businessTaxId" class="form-label">CNPJ</label>
            <input
              type="text"
              class="form-control"
              id="businessTaxId"
              formControlName="businessTaxId"
              [class.is-invalid]="customerForm.get('businessTaxId')?.invalid && customerForm.get('businessTaxId')?.touched"
              placeholder="00.000.000/0000-00"
              maxlength="18"
              appCnpjMask>
            <div class="invalid-feedback">O CNPJ é obrigatório.</div>
          </div>

          <div class="mt-4 border-top pt-3">
            <button type="submit" class="btn btn-success me-2" [disabled]="customerForm.invalid || saving">
              @if (saving) {
                <span class="spinner-border spinner-border-sm me-1"></span>
              }
              {{ isEditMode ? 'Salvar Alterações' : 'Salvar Cliente' }}
            </button>
            <button type="button" class="btn btn-secondary" (click)="goBack()">
              Cancelar
            </button>
          </div>
        </form>
      } @else {
        <div class="text-center py-5">
          <output class="spinner-border text-primary"></output>
          <p class="mt-2">Carregando dados do cliente...</p>
        </div>
      }
    </div>
  </div>
</div>
