<h2 mat-dialog-title class="text-danger border-bottom pb-2">
  <i class="bi bi-exclamation-triangle-fill me-2"></i>
  Confirmar exclusão
</h2>

<mat-dialog-content class="text-dialog-mine-001" style="margin-top: 15px !important;">
  <p>Tem certeza que deseja excluir {{ data.who }} <br>
    <strong class="text-dark">{{ data.name }}</strong>?
  </p>

  <div class="alert alert-warning mb-0 text-dialog-mine-001" role="alert">
    <i class="bi bi-info-circle-fill me-2"></i>
    Esta ação não poderá ser desfeita.
  </div>
</mat-dialog-content>

<mat-dialog-actions class="border-top pt-3 d-flex justify-content-end" style="margin-top: 15px !important;">
  <button type="button" class="btn btn-danger me-3" (click)="onConfirm()">
    Excluir
  </button>

  <button type="button" class="btn btn-secondary" (click)="onCancel()">
    Cancelar
  </button>
</mat-dialog-actions>
